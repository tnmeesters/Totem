manifest:
  defaults:
    revision: v0.3

  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: totem
      url-base: https://github.com/GEIGEIGEIST

  projects:
    - name: zmk
      remote: zmkfirmware
      import: app/west.yml

    - name: totem
      remote: totem
      revision: main

  self:
    path: config
